<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" fill="none" role="img" aria-label="Patient-Tap — Edge-Medical Sovereignty System">
  <defs>
    <radialGradient id="glow" cx="0.82" cy="0.18" r="0.7">
      <stop offset="0" stop-color="#3ec9a7" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#3ec9a7" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#3ec9a7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3ec9a7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#3ec9a7" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#3ec9a7" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="frame"><rect width="1280" height="400" rx="20"/></clipPath>
    <clipPath id="type">
      <rect x="70" y="250" width="0" height="42">
        <animate attributeName="width" from="0" to="700" dur="2.6s" begin="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
      </rect>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- base -->
    <rect width="1280" height="400" fill="#0b0e0d"/>
    <rect width="1280" height="400" fill="url(#glow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- faint vertical hairlines for texture -->
    <g stroke="#1c2420" stroke-width="1">
      <line x1="160" y1="0" x2="160" y2="400"/>
      <line x1="320" y1="0" x2="320" y2="400"/>
      <line x1="480" y1="0" x2="480" y2="400"/>
      <line x1="640" y1="0" x2="640" y2="400"/>
      <line x1="800" y1="0" x2="800" y2="400"/>
      <line x1="960" y1="0" x2="960" y2="400"/>
      <line x1="1120" y1="0" x2="1120" y2="400"/>
    </g>

    <!-- sweeping scanline -->
    <rect x="0" y="-60" width="1280" height="60" fill="url(#scan)" opacity="0.6">
      <animate attributeName="y" values="-60;400" dur="4.5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
    </rect>

    <!-- NFC concentric waves, right side -->
    <g transform="translate(1050 200)" fill="none" stroke="#3ec9a7" stroke-width="3" stroke-linecap="round">
      <circle r="30" opacity="0">
        <animate attributeName="r" values="20;150" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle r="30" opacity="0">
        <animate attributeName="r" values="20;150" dur="3s" begin="1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0" dur="3s" begin="1s" repeatCount="indefinite"/>
      </circle>
      <circle r="30" opacity="0">
        <animate attributeName="r" values="20;150" dur="3s" begin="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0" dur="3s" begin="2s" repeatCount="indefinite"/>
      </circle>
      <!-- core NFC glyph -->
      <g stroke-width="4">
        <path d="M-26 -16 a34 34 0 0 1 0 32"/>
        <path d="M-13 -26 a52 52 0 0 1 0 52"/>
        <path d="M26 -16 a34 34 0 0 0 0 32"/>
        <path d="M13 -26 a52 52 0 0 0 0 52"/>
      </g>
      <circle r="6" fill="#3ec9a7" stroke="none">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- eyebrow -->
    <text x="72" y="120" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', monospace" font-size="17" letter-spacing="4" fill="#5d6660">
      EDGE-MEDICAL SOVEREIGNTY SYSTEM
      <animate attributeName="opacity" from="0" to="1" dur="0.8s" fill="freeze"/>
    </text>

    <!-- wordmark -->
    <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-weight="700">
      <text x="70" y="205" font-size="92" letter-spacing="-2" fill="#eef2ef" opacity="0">
        Patient<tspan fill="#3ec9a7">·</tspan>Tap
        <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.15s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="0 14" to="0 0" dur="0.7s" begin="0.15s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
      </text>
    </g>

    <!-- typewriter tagline -->
    <g clip-path="url(#type)">
      <text x="72" y="282" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" font-weight="500" fill="#98a29c">
        The medical record lives <tspan fill="#3ec9a7" font-weight="600">on the chip</tspan> — not the cloud.
      </text>
    </g>
    <!-- blinking cursor -->
    <rect x="72" y="255" width="3" height="34" fill="#3ec9a7">
      <animate attributeName="x" from="74" to="775" dur="2.6s" begin="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
      <animate attributeName="opacity" values="1;1" dur="2.6s" begin="0.6s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0;1" dur="1s" begin="3.3s" repeatCount="indefinite"/>
    </rect>

    <!-- growing accent underline -->
    <rect x="72" y="320" height="3" rx="2" fill="#3ec9a7" width="0">
      <animate attributeName="width" from="0" to="180" dur="0.9s" begin="0.5s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
    </rect>

    <!-- offline / encrypted chips -->
    <g font-family="'SFMono-Regular', Consolas, monospace" font-size="14" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="1.2s" fill="freeze"/>
      <g transform="translate(72 350)">
        <rect width="150" height="30" rx="8" fill="#12211c" stroke="#264a40"/>
        <circle cx="18" cy="15" r="4" fill="#3ec9a7"/>
        <text x="32" y="20" fill="#7addc4">OFFLINE-FIRST</text>
      </g>
      <g transform="translate(234 350)">
        <rect width="168" height="30" rx="8" fill="#12211c" stroke="#264a40"/>
        <circle cx="18" cy="15" r="4" fill="#3ec9a7"/>
        <text x="32" y="20" fill="#7addc4">AES-256-GCM</text>
      </g>
      <g transform="translate(414 350)">
        <rect width="120" height="30" rx="8" fill="#12211c" stroke="#264a40"/>
        <circle cx="18" cy="15" r="4" fill="#3ec9a7"/>
        <text x="32" y="20" fill="#7addc4">≤ 504 B</text>
      </g>
    </g>

    <!-- border -->
    <rect x="1" y="1" width="1278" height="398" rx="19" fill="none" stroke="#1e2723" stroke-width="2"/>
  </g>
</svg>
