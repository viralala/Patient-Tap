name: patient_tap
description: "Patient-Tap — edge-medical sovereignty. NFC-stored, encrypted patient records with zero network dependency. Frontend (UI/UX) build."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management (kept intentionally simple for a hackathon)
  provider: ^6.1.2

  # Date/time formatting for the treatment log timeline
  # Loose range so it resolves against whatever the installed Flutter pins.
  intl: ">=0.18.0 <0.21.0"

  # iOS-style rounded icons available cross-platform (comes with Flutter,
  # listed here only for clarity — Cupertino icons ship by default)
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # No custom fonts / asset images are bundled yet. The design uses the
  # platform default font with heavy weights (see lib/theme/app_theme.dart)
  # so the app stays fully offline — no network font fetch. Drop illustration
  # assets under assets/ and register them here when available.
